<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Surprise</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffe5ec;
            font-family: 'Arial Rounded MT Bold', 'Helvetica', sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        .container {
            text-align: center;
            z-index: 10;
        }

        /* The Mystery Box */
        #giftBox {
            font-size: 80px;
            cursor: pointer;
            transition: transform 0.1s;
            display: inline-block;
            -webkit-user-select: none;
            user-select: none;

        }

        #giftBox:active {
            transform: scale(0.9);
        }

        .wobble {
            animation: wobble 0.5s infinite;
        }

        @keyframes wobble {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(5deg); }
            50% { transform: rotate(0deg); }
            75% { transform: rotate(-5deg); }
            100% { transform: rotate(0deg); }
        }

        /* Progress Bar */
        .progress-container {
            width: 200px;
            height: 20px;
            background: #fff;
            border-radius: 10px;
            margin: 20px auto;
            border: 3px solid #ffb3c1;
            overflow: hidden;
        }

        #progressBar {
            width: 0%;
            height: 100%;
            background: #ff4d6d;
            transition: width 0.2s;
        }

        /* Card Style */
        .card {
            background: white;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 10px 20px rgba(255, 77, 109, 0.2);
            display: none; /* Hidden at start */
            border: 4px solid #ffccd5;
            max-width: 320px;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        h1 { color: #ff4d6d; font-size: 1.5rem; }
        p { color: #666; font-size: 1rem; line-height: 1.4; }

        .btns {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
        }

        #yesBtn { background: #ff4d6d; color: white; }
        #noBtn { background: #fb6f92; color: white; position: relative; }

        /* Confetti/Hearts Effect */
        .particle {
            position: absolute;
            pointer-events: none;
            animation: floatUp 1s forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100px) scale(0); opacity: 0; }
        }

        #instruction h2 {
            color: #ff4d6d;
        }

        .emoji-large {
            font-size: 50px;
        }
    </style>
</head>
<body>

    <div class="container" id="gameArea">
        <div id="instruction">
            <h2>Tap the gift 10 times!</h2>
        </div>
        
        <div id="giftBox" onclick="handleTap()">🎁</div>
        
        <div class="progress-container">
            <div id="progressBar"></div>
        </div>
    </div>

    <div class="card" id="inviteCard">
        <div class="emoji-large">💖</div>
        <h1>Will you be my Valentine?</h1>
       <p>
Out of all the people in this world,
you're the one I want to spend my time with.
No pressure, no drama 
just good vibes, laughter, and maybe a little kilig. 🥰
Will you be my Valentine?
</p>
        <div class="btns">
            <button id="yesBtn" onclick="finish()">Yes!</button>
            <button id="noBtn" onmouseover="dodge()" onclick="dodge()">No</button>
        </div>
    </div>

    <script>
        let taps = 0;
        const requiredTaps = 10;

        function handleTap() {
            taps++;
            const bar = document.getElementById('progressBar');
            const box = document.getElementById('giftBox');
            
            // Update Progress
            let percentage = (taps / requiredTaps) * 100;
            bar.style.width = percentage + '%';

            // Visual feedback
            box.classList.add('wobble');
            setTimeout(() => box.classList.remove('wobble'), 200);
            
            // Spawn heart particle
            spawnHeart();

            if (taps >= requiredTaps) {
                revealInvitation();
            }
        }

        function spawnHeart() {
            const heart = document.createElement('div');
            heart.className = 'particle';
            heart.innerHTML = '❤️';
            heart.style.left = (window.innerWidth / 2 + (Math.random() * 60 - 30)) + 'px';
            heart.style.top = (window.innerHeight / 2 - 20) + 'px';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 1000);
        }

        function revealInvitation() {
            document.getElementById('gameArea').style.display = 'none';
            document.getElementById('inviteCard').style.display = 'block';
        }

        function dodge() {
            const btn = document.getElementById('noBtn');
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 50);
            btn.style.position = 'fixed';
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }

       function finish() {
    document.getElementById('inviteCard').innerHTML = `
        <div style="font-size: 60px;">🥹</div>
        <h1>That means a lot to me.</h1>
        <p>Thank you for saying yes.</p>
        <p>I’ll make sure it’s a day worth remembering. ❤️</p>
        <p style="font-size: 0.8rem; color: #999;">Can’t wait to see you.</p>
    `;
}
    </script>
</body>
</html>
